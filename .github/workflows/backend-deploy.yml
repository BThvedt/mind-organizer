name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/deploy/mind-organizer/backend

            # Past deploys ran composer / drush inside the PHP container as
            # www-data, which on the bind-mounted host tree leaves files owned
            # by uid 33 and unwritable by the SSH deploy user. That breaks
            # `git reset --hard`. Bring containers up and chown the working
            # tree back to the host user *before* any git operations. The
            # subsequent `chown ... files/` step re-establishes www-data
            # ownership on the user-uploads directory for runtime.
            docker compose -f docker-compose.prod.yml up -d
            HOST_UID=$(id -u)
            HOST_GID=$(id -g)
            docker compose -f docker-compose.prod.yml exec -T php \
              chown -R "$HOST_UID:$HOST_GID" /var/www/html

            cd ..
            # Hard-sync the working tree to origin/main. Safe: gitignored files
            # (.env.prod, keys/, web/sites/default/files/, vendor/, etc.) are
            # preserved. This avoids deploys silently failing on `git pull`
            # when prod's working tree drifts (uncommitted changes or untracked
            # files that collide with newly-tracked files).
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            cd backend

            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml exec -T php chown -R www-data:www-data web/sites/default/files
            docker compose -f docker-compose.prod.yml exec -T --user www-data php composer install --no-dev --no-interaction
            docker compose -f docker-compose.prod.yml exec -T --user www-data php ./vendor/bin/drush cr
            docker compose -f docker-compose.prod.yml exec -T --user www-data php ./vendor/bin/drush updatedb -y
            docker compose -f docker-compose.prod.yml exec -T --user www-data php ./vendor/bin/drush config:import -y
            docker compose -f docker-compose.prod.yml exec -T --user www-data php ./vendor/bin/drush cr

            # Post-deploy sanity check: every module listed in core.extension.yml
            # must actually be enabled. Catches silent config:import failures.
            expected_modules=$(awk '/^module:/{flag=1; next} /^[^[:space:]]/{flag=0} flag && /^  [a-z_]+:/{gsub(/[: ]/, ""); print}' config/sync/core.extension.yml)
            enabled_modules=$(docker compose -f docker-compose.prod.yml exec -T --user www-data php \
              ./vendor/bin/drush pm:list --type=module --status=enabled --field=name --pipe)
            for module in $expected_modules; do
              if ! grep -qx "$module" <<< "$enabled_modules"; then
                echo "ERROR: module '$module' is in core.extension.yml but not enabled on the server." >&2
                exit 1
              fi
            done
name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/deploy/mind-organizer/backend

            # Ensure backend/.env exists. It's now gitignored so it persists
            # across `git clean`, but a fresh prod box may only have .env.prod;
            # auto-seed from it.
            if [ ! -f .env ] && [ -f .env.prod ]; then
              cp .env.prod .env
            fi
            if [ ! -f .env ]; then
              echo "ERROR: backend/.env (or .env.prod to seed it) is required on prod." >&2
              exit 1
            fi

            # Past deploys ran composer / drush as www-data inside the PHP
            # container, which on the bind-mounted host tree leaves files
            # owned by uid 33 and unwritable by the SSH deploy user. That
            # breaks `git reset --hard`. Bring containers up, chown the
            # working tree to the host SSH user for git ops, run them, then
            # chown back to www-data so composer/drush can write.
            docker compose -f docker-compose.prod.yml up -d
            HOST_UID=$(id -u)
            HOST_GID=$(id -g)
            docker compose -f docker-compose.prod.yml exec -T php \
              chown -R "$HOST_UID:$HOST_GID" /var/www/html

            cd ..
            # Hard-sync the working tree to origin/main. Safe: gitignored files
            # (.env, .env.prod, keys/, web/sites/default/files/, vendor/, etc.)
            # are preserved. This avoids deploys silently failing on `git pull`
            # when prod's working tree drifts (uncommitted changes or untracked
            # files that collide with newly-tracked files).
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            cd backend

            # Hand the tree back to www-data so composer/drush (running as
            # www-data inside the container) can write to vendor/, files/, etc.
            docker compose -f docker-compose.prod.yml exec -T php \
              chown -R www-data:www-data /var/www/html

            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml exec -T --user www-data php composer install --no-dev --no-interaction
            docker compose -f docker-compose.prod.yml exec -T --user www-data php ./vendor/bin/drush cr
            docker compose -f docker-compose.prod.yml exec -T --user www-data php ./vendor/bin/drush updatedb -y
            docker compose -f docker-compose.prod.yml exec -T --user www-data php ./vendor/bin/drush config:import -y
            docker compose -f docker-compose.prod.yml exec -T --user www-data php ./vendor/bin/drush cr

            # Post-deploy sanity check: every module listed in core.extension.yml
            # must actually be enabled. Catches silent config:import failures.
            # Lines under `module:` look like `  admin_toolbar: 0` — strip
            # leading spaces and everything from the `:` onward to get just
            # the name. Drupal also stores the install profile under `module:`
            # (e.g. `standard: 1000`), so filter it out using the profile
            # name declared on the `profile:` line. `drush pm:list --type=module`
            # excludes profiles, so otherwise we'd hit a phantom mismatch.
            expected_profile=$(awk '/^profile:/ { print $2 }' config/sync/core.extension.yml)
            expected_modules=$(awk '
              /^module:/ { in_modules=1; next }
              /^[^[:space:]]/ { in_modules=0 }
              in_modules && /^  [a-zA-Z0-9_]+:/ {
                sub(/^[[:space:]]+/, "")
                sub(/:.*$/, "")
                print
              }
            ' config/sync/core.extension.yml | grep -vx "${expected_profile:-__no_profile__}" || true)
            enabled_modules=$(docker compose -f docker-compose.prod.yml exec -T --user www-data php \
              ./vendor/bin/drush pm:list --type=module --status=enabled --field=name --format=list)
            for module in $expected_modules; do
              if ! grep -qx "$module" <<< "$enabled_modules"; then
                echo "ERROR: module '$module' is in core.extension.yml but not enabled on the server." >&2
                exit 1
              fi
            done
services:
  web:
    image: nginx:alpine
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mindorganizer.rule=Host(`mindorganizer.do-bkend.click`)"
      - "traefik.http.routers.mindorganizer.entrypoints=websecure"
      - "traefik.http.routers.mindorganizer.tls.certresolver=letsencrypt"
      - "traefik.http.services.mindorganizer.loadbalancer.server.port=80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - default
      - traefik-public

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www/html
      - ./keys:/var/www/html/keys
    environment:
      DB_HOST: db
      DB_NAME: drupal
      DB_USER: drupal
      DB_PASSWORD: ${DB_PASSWORD}
      HASH_SALT: ${HASH_SALT}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      QDRANT_URL: http://qdrant:6333
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_PREFIX: ${AWS_S3_PREFIX}
    depends_on:
      - db
      - qdrant

  db:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: drupal
      MYSQL_USER: drupal
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  qdrant:
    image: qdrant/qdrant:v1.11.0
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  db_data:
    external: true
    name: mind-organizer_db_data
  qdrant_data:
    external: true
    name: mind-organizer_qdrant_data

networks:
  traefik-public:
    external: true
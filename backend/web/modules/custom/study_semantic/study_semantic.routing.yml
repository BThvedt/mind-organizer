study_semantic.search:
  path: '/api/search/semantic'
  defaults:
    _controller: '\Drupal\study_semantic\Controller\SemanticSearchController::search'
    _title: 'Semantic Search'
  requirements:
    _user_is_logged_in: 'TRUE'
  options:
    _auth:
      - oauth2
      - cookie
  methods: [POST]

study_semantic.ask:
  path: '/api/ai/ask'
  defaults:
    _controller: '\Drupal\study_semantic\Controller\RagController::ask'
    _title: 'Ask AI (RAG)'
  requirements:
    _user_is_logged_in: 'TRUE'
  options:
    _auth:
      - oauth2
      - cookie
  methods: [POST]

study_semantic.related:
  path: '/api/search/related/{type}/{uuid}'
  defaults:
    _controller: '\Drupal\study_semantic\Controller\RelatedController::related'
    _title: 'Related Items'
  requirements:
    _user_is_logged_in: 'TRUE'
    type: 'note|deck|todo'
    uuid: '[0-9a-f-]{36}'
  options:
    _auth:
      - oauth2
      - cookie
  methods: [GET]
